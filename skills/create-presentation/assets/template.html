<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <link rel="stylesheet" href="https://unpkg.com/reveal.js@5/dist/reset.css">
  <link rel="stylesheet" href="https://unpkg.com/reveal.js@5/dist/reveal.css">
  <link rel="stylesheet" href="https://unpkg.com/reveal.js@5/dist/theme/{{THEME}}.css">
  <link rel="stylesheet" href="https://unpkg.com/reveal.js@5/plugin/highlight/monokai.css">
  <style>
    /* ── Title slide ── */
    .slide-title h1 {
      font-size: 2.2em;
      margin-bottom: 0.3em;
    }
    .slide-title p {
      font-size: 0.9em;
      opacity: 0.7;
    }

    /* ── Section divider ── */
    .slide-section {
      background: #2d3436;
      color: #fff;
    }
    .slide-section h2 {
      font-size: 1.8em;
      border: none;
    }

    /* ── Assertion + evidence (core slide type) ── */
    .slide-assertion h2 {
      font-size: 1.1em;
      line-height: 1.2;
      margin-bottom: 0.3em;
      text-align: left;
      opacity: 0.6;
      font-weight: normal;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    /* ── Shared subdued heading for content slides with topic labels ── */
    .slide-concept h2,
    .slide-comparison h2,
    .slide-metric h2,
    .slide-image h2,
    .slide-code h2 {
      font-size: 1.1em;
      line-height: 1.2;
      margin-bottom: 0.3em;
      text-align: left;
      opacity: 0.6;
      font-weight: normal;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .slide-assertion .assertion {
      font-size: 1.3em;
      line-height: 1.4;
      margin-bottom: 0.6em;
      text-align: left;
      font-weight: bold;
    }
    .evidence {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 55%;
      padding: 1em;
    }
    .evidence table {
      border-collapse: collapse;
      margin: 0 auto;
    }
    .evidence table th,
    .evidence table td {
      border: 1px solid #666;
      padding: 0.4em 0.8em;
      text-align: left;
    }
    .evidence table th {
      background: #2d3436;
      color: #fff;
    }
    .evidence pre {
      font-size: 0.75em;
      width: 100%;
    }

    /* ── Key metric ── */
    .slide-metric h2 {
      font-size: 1.3em;
      line-height: 1.3;
      margin-bottom: 0.5em;
    }
    .key-point {
      font-size: 3em;
      font-weight: bold;
      color: #2d3436;
      text-align: center;
      padding: 0.5em 0;
    }
    .key-point .label {
      display: block;
      font-size: 0.35em;
      font-weight: normal;
      opacity: 0.6;
      margin-top: 0.3em;
    }

    /* ── Comparison / columns ── */
    .slide-comparison h2 {
      font-size: 1.3em;
      line-height: 1.3;
      margin-bottom: 0.5em;
      text-align: left;
    }
    .columns {
      display: flex;
      gap: 2em;
      width: 100%;
      justify-content: center;
    }
    .columns .col {
      flex: 1;
      max-width: 45%;
      text-align: left;
    }
    .columns .col h3 {
      font-size: 1em;
      margin-bottom: 0.4em;
    }

    /* ── Quote ── */
    .slide-quote blockquote {
      font-size: 1.4em;
      font-style: italic;
      border: none;
      box-shadow: none;
      padding: 0 1em;
      max-width: 80%;
      margin: 0 auto;
      text-align: left;
    }
    .slide-quote .attribution {
      font-size: 0.5em;
      font-style: normal;
      opacity: 0.7;
      margin-top: 0.8em;
      text-align: right;
    }

    /* ── Code slide ── */
    .slide-code h2 {
      font-size: 1.1em;
      line-height: 1.3;
      margin-bottom: 0.4em;
      text-align: left;
    }

    /* ── Image slide ── */
    .slide-image img {
      max-height: 25vh;
    }

    /* ── Placeholder for missing visuals ── */
    .placeholder {
      border: 2px dashed #999;
      background: #f0f0f0;
      padding: 2em;
      text-align: center;
      color: #666;
      font-style: italic;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
    }

    /* ── Evidence layout variant: stacked ── */
    .evidence-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 55%;
      padding: 1em;
    }

    /* ── List styling inside evidence containers ── */
    .evidence ul,
    .evidence ol {
      text-align: left;
      margin: 0.5em 0;
      padding-left: 1.5em;
    }
    .evidence li {
      margin-bottom: 0.3em;
      font-size: 0.9em;
    }

    /* ── Footnotes and notes ── */
    .footnote-red {
      color: #e74c3c;
      font-size: 0.6em;
      margin-top: 0.5em;
    }
    .note-text {
      font-size: 0.65em;
      opacity: 0.7;
      margin-top: 0.5em;
    }

    /* ── Slide number positioning ── */
    .reveal .slide-number {
      right: auto;
      left: 8px;
    }
  </style>
</head>
<body>

    </div>
  </div>
  <script src="https://unpkg.com/reveal.js@5/dist/reveal.js"></script>
  <script src="https://unpkg.com/reveal.js@5/plugin/highlight/highlight.js"></script>
  <script src="https://unpkg.com/reveal.js@5/plugin/notes/notes.js"></script>
  <script>
    Reveal.initialize({
      hash: true,
      transition: 'slide',
      pdfSeparateFragments: false,
      slideNumber: 'c/t',
      showSlideNumber: 'all',
      plugins: [RevealHighlight, RevealNotes]
    });
  </script>
</body>
</html>
