<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"
 "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="en" xml:lang="en">
<head>
  <title>{{TITLE}}</title>
  <meta name="copyright" content="Copyright &#169; {{YEAR}} {{AUTHOR}}" />
  <link rel="stylesheet" type="text/css" media="screen, projection, print"
   href="http://www.w3.org/Talks/Tools/Slidy2/styles/slidy.css" />
  <link rel="stylesheet" type="text/css" media="screen, projection, print"
   href="http://www.w3.org/Talks/Tools/Slidy2/styles/w3c-blue.css" />
  <script src="http://www.w3.org/Talks/Tools/Slidy2/scripts/slidy.js"
   charset="utf-8" type="text/javascript"></script>
  <style type="text/css">
    /* Assertion-Evidence slide layout */
    .slide h1 {
      font-size: 130%;
      line-height: 1.3;
      margin-bottom: 0.5em;
    }
    .evidence {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 55%;
      padding: 1em;
    }
    .evidence table {
      border-collapse: collapse;
      margin: 0 auto;
    }
    .evidence table th,
    .evidence table td {
      border: 1px solid #666;
      padding: 0.4em 0.8em;
      text-align: left;
    }
    .evidence table th {
      background: #336;
      color: #fff;
    }
    .evidence pre {
      font-size: 85%;
      background: #f5f5f5;
      border: 1px solid #ccc;
      padding: 0.8em;
      overflow-x: auto;
      max-width: 90%;
    }
    .evidence .key-point {
      font-size: 150%;
      font-weight: bold;
      color: #336;
      text-align: center;
    }
    .evidence .columns {
      display: flex;
      gap: 2em;
      width: 100%;
      justify-content: center;
    }
    .evidence .columns .col {
      flex: 1;
      max-width: 45%;
    }
    .placeholder {
      border: 2px dashed #999;
      background: #f0f0f0;
      padding: 2em;
      text-align: center;
      color: #666;
      font-style: italic;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

<div class="background">
  <img id="head-icon" alt="graphic with four colored squares"
    src="http://www.w3.org/Talks/Tools/Slidy2/graphics/icon-blue.png" />
</div>

<!-- TITLE SLIDE -->
<div class="slide cover">
  <h1>{{TITLE}}</h1>
  <p>{{AUTHOR}}</p>
  <p>{{DATE}}</p>
</div>
